name: Robot Framework Tests

on:
  push:
    branches:
      - main

jobs:
  robot-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install robotframework
          pip install robotframework-seleniumlibrary
          pip install selenium
         
      - name: Instalar Google Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable
      # ⏱️ START TIME
      - name: Registrar início
        run: echo "START_TIME=$(date +%s)" >> $GITHUB_ENV

      - name: Executar testes
        run: |
          python -m robot -L TRACE -d Results -i cadastro Teste_robot/Novo.robot

      # 📢 NOTIFICA DISCORD
      - name: Notificar Discord
        if: always()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
          AUTHOR: ${{ github.event.head_commit.author.name }}
          BRANCH: ${{ github.ref_name }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

        run: |
          END_TIME=$(date +%s)

          DURATION=$((END_TIME - START_TIME))
          DURATION_FORMATTED=$(printf "%dm %ds" $((DURATION/60)) $((DURATION%60)))

          curl -H "Content-Type: application/json" \
            -X POST \
            -d "{
              \"content\": \"🧪 *Testes Robot Finalizados!*\n\n📝 Commit: ${COMMIT_MESSAGE}\n👤 Autor: ${AUTHOR}\n🌿 Branch: ${BRANCH}\n⏱️ Duração: ${DURATION_FORMATTED}\n🔗 ${RUN_URL}\"
            }" \
            $DISCORD_WEBHOOK