name: Robot Framework Tests

on:
  push:
    branches:
      - main

jobs:
  robot-tests:
    runs-on: windows-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install robotframework
          pip install robotframework-seleniumlibrary
          pip install robotframework-requests
          pip show robotframework-requests
          

      - name: Executar testes
        run: |
           py -m robot -L TRACE -d Results tests/cadastro_test.robot
           py -m robot -L TRACE -d Results tests/Cadastro_api.robot

      - name: Notificar Discord
        if: always()
        shell: pwsh
        env:
            DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
            COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
            AUTHOR: ${{ github.event.head_commit.author.name }}
            BRANCH: ${{ github.ref_name }}
            RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

        run: |
         $body = @{
         content = "🧪 Testes Robot Finalizados!`n`n📝 Commit: $env:COMMIT_MESSAGE`n👤 Autor: $env:AUTHOR`n🌿 Branch: $env:BRANCH`n🔗 $env:RUN_URL"
         } | ConvertTo-Json

         Invoke-RestMethod -Uri $env:DISCORD_WEBHOOK -Method Post -Body $body -ContentType "application/json"