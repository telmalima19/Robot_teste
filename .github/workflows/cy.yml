name: Robot Framework Tests
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
    push:
        branches:
            - main

jobs:
    robot-tests:
        runs-on: windows-latest

        steps:
        - name: Checkout código
          uses: actions/checkout@v4

        - name: Configurar Python
          uses: actions/setup-python@v5
          with:
           python-version: '3.14'

        - name: Instalar dependências
          run: |
               python -m pip install --upgrade pip
               pip install -r requirements.txt
               pip install robotframework
               pip install robotframework-seleniumlibrary

        - name: Executar testes
          run: 
            py -m robot -L TRACE -d Results -i cadastro Teste_robot/Novo.robot
        
        - name: Calcular resultados e notificar no Discord
          if: always()
          env:
           DISCORD_WEBHOOK: https://discord.com/api/webhooks/1511812111288897556/JpWhEZY401Vt1Af1hWbKhXZWwX46mwPfnlSZk5gqTnlRxq196D79KOHzimuEUxflOf9d
           STATUS: ${{ job.status }}
           COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
           AUTHOR: ${{ github.event.head_commit.author.name }}
           BRANCH: ${{ github.ref_name }}
           RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          run: |
             # Tempo de execução
             DURATION=$((END_TIME - START_TIME))
             DURATION_FORMATTED=$(printf "%dm %ds" $((DURATION/60)) $((DURATION%60)))
             # Enviar para o Discord
             curl -H "Content-Type: application/json" \
               -X POST \
               -d "{
                    \"content\": \"🧪 *Testes Robot web Finalizados!*\n\n✅ *Status:* **${STATUS}**\n📝 *Commit:* ${COMMIT_MESSAGE}\n👤 *Autor:* ${AUTHOR}\n🌿 *Branch:* ${BRANCH}\n⏱️ *Duração:* ${DURATION_FORMATTED}\n\n🔗 [Ver no GitHub Actions](${RUN_URL})\"
               }" \
               $DISCORD_WEBHOOK